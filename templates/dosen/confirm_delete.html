{% extends 'dosen/base.html' %}
{% block title %}Konfirmasi Hapus{% endblock %}
{% block page_title %}Konfirmasi Hapus{% endblock %}

{% block content %}
<div class="card" style="max-width:500px">
  <div class="card-header fw-semibold text-danger"><i class="bi bi-exclamation-triangle"></i> {{ title }}</div>
  <div class="card-body">
    <p>Apakah Anda yakin ingin menghapus:</p>
    <div class="alert alert-warning fw-semibold">{{ obj }}</div>
    <p class="text-muted" style="font-size:0.85rem">Tindakan ini tidak dapat dibatalkan.</p>
    <form method="post">
      {% csrf_token %}
      <button type="submit" class="btn btn-danger"><i class="bi bi-trash"></i> Ya, Hapus</button>
      <a href="javascript:history.back()" class="btn btn-outline-secondary ms-2">Batal</a>
    </form>
  </div>
</div>
{% endblock %}
