<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Login - SIMPEG UNTAD</title>
<link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/css/bootstrap.min.css" rel="stylesheet">
<style>
body { background: linear-gradient(135deg, #1a5c2a 0%, #2d8a47 100%); min-height: 100vh; display: flex; align-items: center; }
.login-card { max-width: 420px; width: 100%; margin: auto; }
.login-logo { width: 72px; height: 72px; background: #c8a227; border-radius: 16px; display: flex; align-items: center; justify-content: center; font-size: 2rem; font-weight: 900; color: #1a5c2a; margin: 0 auto 1rem; }
</style>
</head>
<body>
<div class="container">
  <div class="login-card">
    <div class="card shadow-lg border-0 rounded-4">
      <div class="card-body p-5">
        <div class="login-logo">U</div>
        <h4 class="text-center fw-bold mb-1">SIMPEG Dosen</h4>
        <p class="text-center text-muted mb-4" style="font-size:0.85rem">Universitas Tadulako</p>
        {% if messages %}
          {% for msg in messages %}
          <div class="alert alert-danger py-2">{{ msg }}</div>
          {% endfor %}
        {% endif %}
        <form method="post">
          {% csrf_token %}
          <div class="mb-3">
            <label class="form-label fw-semibold">Username</label>
            <input type="text" name="username" class="form-control form-control-lg" placeholder="Masukkan username" required autofocus>
          </div>
          <div class="mb-4">
            <label class="form-label fw-semibold">Password</label>
            <input type="password" name="password" class="form-control form-control-lg" placeholder="Masukkan password" required>
          </div>
          <button type="submit" class="btn btn-success btn-lg w-100 fw-semibold">Masuk</button>
        </form>
      </div>
    </div>
    <p class="text-center text-white mt-3" style="font-size:0.8rem;opacity:0.7">DUK Dosen &copy; 2026 UNTAD</p>
  </div>
</div>
</body>
</html>
